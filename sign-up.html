<!DOCTYPE html>
<html lang="en">
<head>
    <title>RHYTHM BREAK</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            <img src="images/LOGO.png" alt="" class="brand-logo">
            <span class="brand-title">RHYTHM BREAK</span>
        </div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="genre.html">GENRE </a>
            <a href="playlist.html"> PLAYLIST </a>
            <a href="sign-in.html">SIGN IN</a>
        </nav>
        <div class="log-in">
            <div class="login-container">
                <div class="login-header">
                    <h1>Welcome To Rythm Break</h1>
                    <p>Sign up or Create an Account</p>
                </div>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="Name">First Name</label>
                        <input type="Name" id="Name" name="Name" placeholder="Enter your Last Name" required>
                    </div>
                    <div class="form-group">
                        <label for="Name">Last Name</label>
                        <input type="Name" id="Name" name="Name" placeholder="Enter your Last Name" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            <p>By checking this box, you agree to our <a href="terms.html">Terms of Use,</a> and acknowledge having read our <a href="privacypolicy.html">Privacy Notice</a>.</p></label>
                        </div>
                        <button type="submit" class="sign-in-btn">Sign Up</button>
                    </form>
                </div>
            </div>
        </body>
        </html>
