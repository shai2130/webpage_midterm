<!DOCTYPE html>
<html lang="en">
<head>
    <title>RHYTHM BREAK</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            <img src="images/LOGO.png" alt="" class="brand-logo">
            <span class="brand-title">RHYTHM BREAK</span></div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="genre.html">GENRE </a>
            <a href="playlist.html"> PLAYLIST </a>
            <a href="sign-in.html">SIGN IN</a></nav>
        <div class="log-in">
            <div class="login-container">
                <div class="login-header">
                    <h1>Welcome Back</h1>
                    <p>Sign in to continue to your account</p></div>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required></div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required></div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember"> Remember me</label>
                        <a href="#" class="forgot-password">Forgot password?</a></div>
                    <button type="submit" class="sign-in-btn">Sign In</button></form>
                <div class="divider">
                    <span>or continue with</span> </div>
        <p class="signup-link">
            Don't have an account? <a href="sign-up.html">Sign up</a> </p>
    </div>
    </div>

</html>
